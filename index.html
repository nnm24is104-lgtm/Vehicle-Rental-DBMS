<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Vehicle System</title>
</head>
<body class="container bg-light mt-5">

    <div class="p-4 bg-white shadow-sm rounded">
        <h2 class="text-primary">Vehicle Management</h2>
        <hr>
        
        <a href="/reset" class="btn btn-danger mb-3">System Reset (Trigger)</a>
        
        <table class="table table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Vehicle Model</th>
                    <th>Current Status</th>
                    <th>Customer Name</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for c in cars %}
                <tr>
                    <td>{{ c.id }}</td>
                    <td>{{ c.model }}</td>
                    <td>{{ c.status }}</td>
                    <td>{{ c.renter }}</td>
                    <td>
                        {% if c.status == 'Available' %}
                        <form action="/book/{{ c.id }}" method="POST" class="d-flex">
                            <input type="text" name="user_name" placeholder="Enter Name" required class="form-control me-2">
                            <button class="btn btn-success">Rent</button>
                        </form>
                        {% else %}
                        <span class="text-danger fw-bold">Booked</span>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>
</html>
